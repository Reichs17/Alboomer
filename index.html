<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/6152397b88.js" crossorigin="anonymous"></script>
    <title>Compartilhamento de álbuns</title>
</head>
<body>
    <header class="top-nav">
        <h1 class="logo">Álboomer</h1>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Pesquisar...">
            <i class="fas fa-search"></i>
        </div>
        <nav>
            <ul>
                <li><a href="#home">Início</a></li>
                <li><a href="#albums">Álbuns</a></li>
                <li><a href="#contact">Discover</a></li>
                <li><a href="#" id="toggleTheme">Dark</a></li>
            </ul>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-box">
            <!-- VIEW DE LOGIN -->
            <div class="login-view" id="loginView">
                <h2>Entrar no Álboomer</h2>
                <p class="login-subtitle">Compartilhe e descubra álbuns incríveis</p>

                <form id="loginForm">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Digite seu email" required>

                    <label>Senha</label>
                    <input type="password" name="password" placeholder="Digite sua senha" required>

                    <button type="submit">Entrar</button>
                </form>

                <div class="login-footer">
                    <a href="#">Esqueceu a senha?</a>
                    <span>•</span>
                    <a href="#" id="showRegisterLink">Criar conta</a>
                </div>  
            </div>
        </div>
    <script src="script.js"></script>
</body>
</html>
